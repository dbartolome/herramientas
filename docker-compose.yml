services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nimbus_security}
      POSTGRES_USER: ${POSTGRES_USER:-nimbus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nimbus_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./platform
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
    env_file:
      - ./.env.api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

  worker:
    build:
      context: ./platform
      dockerfile: workers/security_worker/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - api
    env_file:
      - ./.env.worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

  web:
    build:
      context: ./platform
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:
  redis_data:
