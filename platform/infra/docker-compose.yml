services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nimbus_security
      POSTGRES_USER: nimbus
      POSTGRES_PASSWORD: nimbus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

volumes:
  postgres_data:
